name: edumind_app
description: OpenMind Game Studio — personalized educational games for elementary school (grades 1-6).
publish_to: 'none'
version: 4.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  shared_preferences: ^2.3.0
  webview_flutter: ^4.10.0
  google_fonts: ^6.2.0
  flutter_animate: ^4.5.0
  # native offline game store (Drift = sqlite)
  drift: ^2.33.0
  drift_flutter: ^0.3.0
  path_provider: ^2.1.0
  # web offline game store (IndexedDB adapter)
  idb_shim: ^2.6.0
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.33.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/shells/
    - assets/samples/
